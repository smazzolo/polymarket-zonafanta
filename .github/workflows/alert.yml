# Promemoria Telegram — 3 girate al giorno alle 9:00 / 14:00 / 20:00 ORA ITALIANA.
#
# GitHub Actions schedula solo in UTC e non conosce l'ora legale, quindi:
# - il cron copre ENTRAMBI gli orari possibili (CEST = UTC+2 d'estate,
#   CET = UTC+1 d'inverno) → 6 trigger al giorno;
# - il primo step controlla l'ora reale a Europe/Rome e prosegue SOLO se è
#   una delle tre ore giuste → sempre esattamente 3 girate/giorno, tutto
#   l'anno, senza toccare nulla al cambio d'ora.
name: alert-insights

on:
  schedule:
    - cron: "0 7,12,18 * * *"   # 9/14/20 quando l'Italia è in ora legale (UTC+2)
    - cron: "0 8,13,19 * * *"   # 9/14/20 quando l'Italia è in ora solare (UTC+1)
  workflow_dispatch: {}          # lancio manuale per test

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: È l'ora giusta in Italia?
        id: ora
        run: |
          ORA=$(TZ=Europe/Rome date +%H)
          echo "Ora a Roma: $ORA"
          if [ "$ORA" = "09" ] || [ "$ORA" = "14" ] || [ "$ORA" = "20" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "esegui=true" >> "$GITHUB_OUTPUT"
          else
            echo "esegui=false" >> "$GITHUB_OUTPUT"
            echo "Trigger dell'altro fuso: salto (comportamento atteso al cambio d'ora)."
          fi

      - name: Checkout
        if: steps.ora.outputs.esegui == 'true'
        uses: actions/checkout@v4

      - name: Alert finestre scadute
        if: steps.ora.outputs.esegui == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/alert.py
