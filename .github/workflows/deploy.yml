# Deploy su Vercel — su ogni push su main.
#
# Catena: validate → build → deploy. Se validate.py trova errori bloccanti,
# build.py si ferma da solo (li esegue in catena) e il deploy NON parte:
# è impossibile pubblicare una dashboard con dati incoerenti.
#
# Due versioni, un solo build:
# - dashboard/index.html          → standalone zero-fetch (per Antonio, file://)
# - .deploy/ (index.html + api/)  → versione Vercel CON tracker Telegram
#
# Secrets richiesti (GitHub → Settings → Secrets → Actions):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (le env TELEGRAM_* del tracker si impostano su Vercel, non qui)
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lancio manuale per test

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dipendenze build (Pillow per la compressione slide)
        run: pip install Pillow

      - name: Validate + build + assembla versione deploy
        run: python3 scripts/build.py --deploy .deploy

      - name: Deploy su Vercel (produzione)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          cd .deploy
          vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
